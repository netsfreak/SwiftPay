version: "3.9"

services:
  # =====================
  # PostgreSQL Database
  # =====================
  ppps-db:
    image: postgres:16-alpine
    container_name: ppps-postgres
    environment:
      POSTGRES_DB: ppps_db
      POSTGRES_USER: ppps_user
      POSTGRES_PASSWORD: local_test_password
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=500 -c effective_cache_size=1GB -c maintenance_work_mem=64MB -c checkpoint_completion_target=0.9 -c wal_buffers=16MB -c default_statistics_target=100 -c random_page_cost=1.1 -c effective_io_concurrency=200 -c work_mem=262144"
    ports:
      - "5432:5432"
    volumes:
      - ppps_db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ppps_user -d ppps_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =====================
  # Redis Cache
  # =====================
  redis:
    image: redis:7-alpine
    container_name: ppps-redis
    command: ["redis-server", 
              "--appendonly", "yes",
              "--maxmemory", "1gb",
              "--maxmemory-policy", "allkeys-lru",
              "--tcp-backlog", "511",
              "--timeout", "0",
              "--databases", "16"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: always

  # =====================
  # Zookeeper (Kafka dependency)
  # =====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ppps-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 10
      ZOOKEEPER_INIT_LIMIT: 5
    ports:
      - "2181:2181"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: always

  # =====================
  # Kafka Brokers (3-node cluster)
  # =====================
  kafka-1:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ppps-kafka-1
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_NETWORK_THREADS: 8
      KAFKA_NUM_IO_THREADS: 8
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 102400
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 102400
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600
    ports:
      - "9094:9094"
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: always

  kafka-2:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ppps-kafka-2
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092,PLAINTEXT_HOST://localhost:9095
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_NETWORK_THREADS: 8
      KAFKA_NUM_IO_THREADS: 8
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 102400
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 102400
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600
    ports:
      - "9095:9095"
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: always

  kafka-3:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ppps-kafka-3
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092,PLAINTEXT_HOST://localhost:9096
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_NETWORK_THREADS: 8
      KAFKA_NUM_IO_THREADS: 8
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 102400
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 102400
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600
    ports:
      - "9096:9096"
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: always

  # =====================
  # Phase 1 Microservices
  # =====================
  notification-service:
    build:
      context: ./services/notification-service
    container_name: ppps-notification-service
    depends_on:
      - kafka-1
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      KAFKA_CONSUMER_GROUP: notification-service-group
    ports:
      - "9091:9091"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: always

  audit-service:
    build:
      context: ./services/audit-service
    container_name: ppps-audit-service
    depends_on:
      - kafka-1
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      KAFKA_CONSUMER_GROUP: audit-service-group
    ports:
      - "9092:9092"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: always

  # =====================
  # Core Microservices
  # =====================
  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: ppps-api-gateway
    depends_on:
      - auth-service
      - user-service
      - wallet-service
      - payment-service
      - funding-service
    environment:
      AUTH_SERVICE_URL: http://auth-service:9081
      USER_SERVICE_URL: http://user-service:9082
      WALLET_SERVICE_URL: http://wallet-service:9083
      PAYMENT_SERVICE_URL: http://payment-service:9084
      FUNDING_SERVICE_URL: http://funding-service:9085
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1.5G
        reservations:
          cpus: '1'
          memory: 512M
    restart: always

  auth-service:
    build:
      context: ./services/auth-service
    container_name: ppps-auth-service
    ports:
      - "9081:9081"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: always

  user-service:
    build:
      context: ./services/user-service
    container_name: ppps-user-service
    ports:
      - "9082:9082"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: always

  wallet-service:
    build:
      context: ./services/wallet-service
    container_name: ppps-wallet-service
    depends_on:
      - ppps-db
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://ppps-db:5432/ppps_db
      SPRING_DATASOURCE_USERNAME: ppps_user
      SPRING_DATASOURCE_PASSWORD: local_test_password
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    ports:
      - "9083:9083"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    restart: always

  payment-service:
    build:
      context: ./services/payment-service
    container_name: ppps-payment-service
    depends_on:
      - kafka-1
      - wallet-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      WALLET_SERVICE_URL: http://wallet-service:9083
    ports:
      - "9084:9084"
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: always

  funding-service:
    build:
      context: ./services/funding-service
    container_name: ppps-funding-service
    depends_on:
      - kafka-1
      - wallet-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      WALLET_SERVICE_URL: http://wallet-service:9083
    ports:
      - "9085:9085"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: always

# =====================
# Persistent Volumes
# =====================
volumes:
  ppps_db_data:
  redis_data:


