version: "3.9"

services:
  # =====================
  # PostgreSQL Database
  # =====================
  ppps-db:
    image: postgres:16-alpine
    container_name: ppps-postgres
    environment:
      POSTGRES_DB: ppps_db
      POSTGRES_USER: ppps_user
      POSTGRES_PASSWORD: local_test_password
    ports:
      - "5432:5432"
    volumes:
      - ppps_db_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ppps_user -d ppps_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =====================
  # Redis Cache
  # =====================
  redis:
    image: redis:7-alpine
    container_name: ppps-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # =====================
  # Zookeeper (Kafka dependency)
  # =====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ppps-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: always

  # =====================
  # Kafka Broker
  # =====================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ppps-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9094:9094"
    restart: always

  # =====================
  # Phase 1 Microservices
  # =====================
  notification-service:
    build:
      context: ./services/notification-service
    container_name: ppps-notification-service
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP: notification-service-group
    ports:
      - "9091:9091"
    restart: always

  audit-service:
    build:
      context: ./services/audit-service
    container_name: ppps-audit-service
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP: audit-service-group
    ports:
      - "9092:9092"
    restart: always

  # =====================
  # Core Microservices
  # =====================
  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: ppps-api-gateway
    depends_on:
      - auth-service
      - user-service
      - wallet-service
      - payment-service
      - funding-service
    environment:
      AUTH_SERVICE_URL: http://auth-service:9081
      USER_SERVICE_URL: http://user-service:9082
      WALLET_SERVICE_URL: http://wallet-service:9083
      PAYMENT_SERVICE_URL: http://payment-service:9084
      FUNDING_SERVICE_URL: http://funding-service:9085
    ports:
      - "8080:8080"
    restart: always

  auth-service:
    build:
      context: ./services/auth-service
    container_name: ppps-auth-service
    ports:
      - "9081:9081"
    restart: always

  user-service:
    build:
      context: ./services/user-service
    container_name: ppps-user-service
    ports:
      - "9082:9082"
    restart: always

  wallet-service:
    build:
      context: ./services/wallet-service
    container_name: ppps-wallet-service
    ports:
      - "9083:9083"
    restart: always

  payment-service:
    build:
      context: ./services/payment-service
    container_name: ppps-payment-service
    depends_on:
      - kafka
      - wallet-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      WALLET_SERVICE_URL: http://wallet-service:9083
    ports:
      - "9084:9084"
    restart: always

  funding-service:
    build:
      context: ./services/funding-service
    container_name: ppps-funding-service
    depends_on:
      - kafka
      - wallet-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      WALLET_SERVICE_URL: http://wallet-service:9083
    ports:
      - "9085:9085"
    restart: always

# =====================
# Persistent Volumes
# =====================
volumes:
  ppps_db_data:
  redis_data:

