spring.application.name=payment-service
server.port=9084

services.wallet.base-url=${WALLET_SERVICE_URL:http://localhost:9083}

# ============================
# KAFKA CONFIGURATION (Optimized)
# ============================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Performance tuning
spring.kafka.producer.compression-type=snappy
spring.kafka.producer.batch-size=32768
spring.kafka.producer.linger-ms=10
spring.kafka.producer.buffer-memory=67108864
spring.kafka.producer.acks=1
spring.kafka.producer.retries=3

# Consumer tuning
spring.kafka.consumer.max-poll-records=500
spring.kafka.consumer.fetch-min-bytes=10240
spring.kafka.consumer.fetch-max-wait-ms=500

# ============================
# RESILIENCE4J CONFIGURATION
# ============================
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=30000
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=10
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true

management.endpoints.web.exposure.include=health,info,prometheus
management.metrics.export.prometheus.enabled=true

