spring.application.name=api-gateway
server.port=8080

# Gateway Request Timeout Configuration
spring.cloud.gateway.httpclient.connect-timeout=100
spring.cloud.gateway.httpclient.response-timeout=500ms
spring.cloud.gateway.httpclient.pool.type=elastic
spring.cloud.gateway.httpclient.pool.max-connections=500
spring.cloud.gateway.httpclient.pool.pending-acquire-timeout=PT5S

# WebFlux Server Configuration (for 250 TPS)
server.tomcat.threads.max=500
server.tomcat.threads.min-spare=50
server.max-http-request-header-size=16KB

# Circuit Breaker for gateway routes
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=30000
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.payment-service.base-config=default
resilience4j.circuitbreaker.instances.wallet-service.base-config=default

# Routes with Rate Limiting
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URL:http://localhost:9081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**
spring.cloud.gateway.routes[0].filters[0]=RateLimitingFilter

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=${USER_SERVICE_URL:http://localhost:9082}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/users/**
spring.cloud.gateway.routes[1].filters[0]=RateLimitingFilter

spring.cloud.gateway.routes[2].id=wallet-service
spring.cloud.gateway.routes[2].uri=${WALLET_SERVICE_URL:http://localhost:9083}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/wallets/**
spring.cloud.gateway.routes[2].filters[0]=RateLimitingFilter

spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=${PAYMENT_SERVICE_URL:http://localhost:9084}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/transfers/**
spring.cloud.gateway.routes[3].filters[0]=RateLimitingFilter
spring.cloud.gateway.routes[3].filters[1].name=CircuitBreaker
spring.cloud.gateway.routes[3].filters[1].args.name=payment-service

spring.cloud.gateway.routes[4].id=funding-service
spring.cloud.gateway.routes[4].uri=${FUNDING_SERVICE_URL:http://localhost:9085}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/funding/**,/api/v1/withdrawals/**,/api/v1/webhooks/**
spring.cloud.gateway.routes[4].filters[0]=RateLimitingFilter

management.endpoints.web.exposure.include=health,info,prometheus
management.metrics.export.prometheus.enabled=true

